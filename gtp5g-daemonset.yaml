apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gtp5g-installer
  namespace: kube-system
  labels:
    app: gtp5g-installer
spec:
  selector:
    matchLabels:
      app: gtp5g-installer
  template:
    metadata:
      labels:
        app: gtp5g-installer
    spec:
      tolerations:
        - operator: Exists
      hostPID: true
      hostNetwork: true
      initContainers:
        - name: install-gtp5g
          image: ubuntu:22.04
          securityContext:
            privileged: true
          command:
            - sh
            - -c
            - |
              set -e

              # The gtp5g range is tied to the free5GC UPF version:
              #   * free5gc/upf:v4.2.1 requires 0.9.5 <= v < 0.10.0
              #   * the old towards5gs UPF (v3.x) required 0.8.1 <= v < 0.9.0
              # The UPF refuses an out-of-range module with
              # "version mismatch: gtp5g version(X) should be 0.9.5 <= ...".
              # v0.9.16 is the highest in-range release. The version-aware
              # reinstall below rmmod's any other loaded version (e.g. a stale
              # 0.8.10) and rebuilds — a plain "skip if loaded" would freeze it.
              GTP5G_VERSION="v0.9.16"
              WANT="${GTP5G_VERSION#v}"
              GTP5G_DIR="/tmp/gtp5g"
              MARKER="/var/lib/gtp5g.version"   # on host: records the built version

              # Get the running kernel version from the host
              KERNEL=$(chroot /host uname -r)
              echo "Detected kernel: $KERNEL ; desired gtp5g: $WANT"

              # Is the CORRECT version already loaded? Only then skip. The old
              # "skip if any gtp5g is loaded" froze a wrong version on the node —
              # changing GTP5G_VERSION had no effect because 0.9.16 stayed loaded.
              if chroot /host sh -c "lsmod | grep -q '^gtp5g'"; then
                CUR=$(chroot /host sh -c "cat /sys/module/gtp5g/version 2>/dev/null" | tr -d '[:space:]')
                [ -n "$CUR" ] || CUR=$(chroot /host sh -c "cat $MARKER 2>/dev/null" | tr -d '[:space:]')
                echo "gtp5g already loaded (version='${CUR:-unknown}')"
                if [ "$CUR" = "$WANT" ]; then
                  echo "Loaded gtp5g matches desired version, skipping."
                  exit 0
                fi
                echo "Version mismatch — unloading gtp5g to install ${WANT}..."
                if ! chroot /host rmmod gtp5g; then
                  echo "ERROR: gtp5g is in use and cannot be unloaded. Scale the"
                  echo "free5GC UPF to 0 (so it releases the GTP devices), then"
                  echo "restart this DaemonSet (kubectl rollout restart)."
                  exit 1
                fi
              fi

              echo "Installing build dependencies on host..."
              chroot /host apt-get update -qq
              chroot /host apt-get install -y --no-install-recommends \
                gcc \
                make \
                git \
                linux-headers-${KERNEL}

              echo "Cloning gtp5g ${GTP5G_VERSION}..."
              rm -rf /host${GTP5G_DIR}
              chroot /host git clone \
                --branch ${GTP5G_VERSION} \
                --depth 1 \
                https://github.com/free5gc/gtp5g.git \
                ${GTP5G_DIR}

              echo "Building gtp5g..."
              chroot /host sh -c "cd ${GTP5G_DIR} && make clean && make"

              echo "Installing gtp5g..."
              chroot /host sh -c "cd ${GTP5G_DIR} && make install"

              echo "Loading module..."
              chroot /host modprobe gtp5g

              echo "Recording installed version..."
              echo "${WANT}" > /host${MARKER}

              echo "Enabling ip_forward..."
              chroot /host sysctl -w net.ipv4.ip_forward=1
              echo "net.ipv4.ip_forward=1" > /host/etc/sysctl.d/99-ip-forward.conf

              echo "Done! gtp5g ${WANT} loaded successfully."
          volumeMounts:
            - name: host-root
              mountPath: /host
      containers:
        - name: pause
          image: rancher/mirrored-pause:3.6
          securityContext:
            privileged: true
      volumes:
        - name: host-root
          hostPath:
            path: /
